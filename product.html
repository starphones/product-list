  :root {

    --accent2: #f7a26a;
    --green: #4ade80;
    --blue: #60a5fa;

  .header-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .logo-star { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .header p { font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 0.5px; }
  .rate-badges { display: flex; gap: 8px; margin-top: 14px; }
  .rate-badge { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
  .rate-badge.r65 { color: #60a5fa; border-color: rgba(96,165,250,0.3); }
  .rate-badge.r70 { color: #4ade80; border-color: rgba(74,222,128,0.3); }

  /* BREADCRUMB */
  .breadcrumb { padding: 12px 20px; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); overflow-x: auto; white-space: nowrap; background: var(--surface); border-bottom: 1px solid var(--border); }
  .breadcrumb span { color: var(--text); font-weight: 500; }
  .breadcrumb .sep { color: var(--muted); }
  .back-btn { background: rgba(124,106,247,0.15); border: 1px solid rgba(124,106,247,0.3); color: var(--accent); border-radius: 8px; padding: 6px 12px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-weight: 500; transition: all 0.2s; }
  .back-btn:active { background: rgba(124,106,247,0.3); }

  /* SCREENS */
  .screen { display: none; padding: 16px 16px 100px; animation: fadeUp 0.25s ease; }
  .screen.active { display: block; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  /* CATEGORY CARDS (screen 1) */
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
  .cat-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .cat-card::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 0%, rgba(124,106,247,0.12), transparent 70%); opacity: 0; transition: opacity 0.2s; }
  .cat-card:active { transform: scale(0.97); }
  .cat-card:active::after { opacity: 1; }
  .cat-icon { font-size: 36px; margin-bottom: 10px; display: block; }
  .cat-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; line-height: 1.3; }
  .cat-count { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .cat-card.cases { border-top: 3px solid #7c6af7; }
  .cat-card.accessories { border-top: 3px solid #f7a26a; }
  .cat-card.protectors { border-top: 3px solid #4ade80; }

  /* SECTION TITLE */
  .section-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  /* ATTRIBUTE LIST */
  .attr-list { display: flex; flex-direction: column; gap: 8px; }
  .attr-item { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: all 0.15s; }
  .attr-item:active { background: rgba(124,106,247,0.12); border-color: var(--accent); }
  .attr-item-left { display: flex; flex-direction: column; gap: 2px; }
  .attr-item-name { font-weight: 600; font-size: 14px; }
  .attr-item-sub { font-size: 11px; color: var(--muted); }
  .attr-arrow { color: var(--muted); font-size: 16px; }

  /* PRODUCT CARDS */
  .product-list { display: flex; flex-direction: column; gap: 10px; }
  .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; cursor: pointer; transition: all 0.15s; }
  .product-card:active { border-color: var(--accent); }
  .product-name { font-weight: 600; font-size: 13px; line-height: 1.4; margin-bottom: 8px; }
  .product-attr2 { font-size: 11px; color: var(--muted); background: var(--pill-bg); border-radius: 6px; padding: 2px 8px; display: inline-block; margin-bottom: 8px; }
  .price-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .price-pill { border-radius: 8px; padding: 6px 10px; font-size: 11px; font-weight: 600; text-align: center; flex: 1; min-width: 70px; }
  .price-pill.usd { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); }
  .price-pill.r65 { background: rgba(96,165,250,0.12); color: #60a5fa; border: 1px solid rgba(96,165,250,0.25); }
  .price-pill.r70 { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
  .price-label { font-size: 9px; opacity: 0.7; font-weight: 400; display: block; margin-bottom: 1px; }

  /* DETAIL VIEW */
  .detail-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px; margin-bottom: 16px; }
  .detail-product-name { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .detail-tag { background: rgba(124,106,247,0.15); border: 1px solid rgba(124,106,247,0.3); color: var(--accent); border-radius: 8px; padding: 3px 10px; font-size: 11px; font-weight: 500; }
  .price-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .price-box { border-radius: 14px; padding: 16px 12px; text-align: center; }
  .price-box.usd { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
  .price-box.r65 { background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.25); }
  .price-box.r70 { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); }
  .price-box-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.3px; }
  .price-box-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .price-box.usd .price-box-value { color: rgba(255,255,255,0.8); }
  .price-box.r65 .price-box-value { color: #60a5fa; }
  .price-box.r70 .price-box-value { color: #4ade80; }
  .supplier-box { background: rgba(247,162,106,0.1); border: 1px solid rgba(247,162,106,0.25); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .supplier-icon { width: 36px; height: 36px; background: rgba(247,162,106,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .supplier-label { font-size: 10px; color: var(--muted); }
  .supplier-name { font-weight: 700; font-size: 15px; color: var(--accent2); }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px 12px 40px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }

  /* NAV */

  .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 6px 14px; border-radius: 12px; transition: all 0.15s; border: none; background: none; color: var(--muted); font-family: 'DM Sans', sans-serif; }
  .nav-btn.active { color: var(--accent); background: rgba(124,106,247,0.12); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; font-weight: 500; }
</style>
</head>

const CAT_LABELS = { cases: 'Cases & Covers', accessories: 'Accessories', protectors: 'Screen Protectors' };
const CAT_COLORS = { cases: '#7c6af7', accessories: '#f7a26a', protectors: '#4ade80' };

let currentCat = null, currentAttr1 = null, currentAttr2 = null;
let filteredData = [];

function fmt(v) { return v == null ? 'TBC' : '$' + v.toFixed(2); }

function setBreadcrumb(parts) {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = parts.map((p,i) => i < parts.length-1 ? `<span style="color:var(--muted)">${p}</span><span class="sep"> › </span>` : `<span>${p}</span>`).join('');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function goHome() {
  currentCat = null; currentAttr1 = null;
  setBreadcrumb(['Home']);
  showScreen('home');
}

function goAttr1(cat) {
  currentCat = cat;
  currentAttr1 = null;
  const color = CAT_COLORS[cat];
  document.getElementById('attr1-title').innerHTML = `<span class="section-dot" style="background:${color}"></span> ${CAT_LABELS[cat]}`;
  document.getElementById('search-attr1').value = '';
  renderAttr1(DATA[cat]);
  setBreadcrumb(['Home', CAT_LABELS[cat]]);
  showScreen('attr1');
}

function renderAttr1(data) {
  const groups = {};
  data.forEach(r => { if (!groups[r[0]]) groups[r[0]] = new Set(); groups[r[0]].add(r[1]); });
  const list = document.getElementById('attr1-list');
  list.innerHTML = Object.entries(groups).map(([a1, a2set]) => `
    <div class="attr-item" onclick="goProducts('${a1.replace(/'/g,"\\'")}')">
      <div class="attr-item-left">
        <div class="attr-item-name">${a1}</div>
        <div class="attr-item-sub">${[...a2set].filter(Boolean).join(' · ') || 'All variants'}</div>
      </div>
      <span class="attr-arrow">›</span>
    </div>`).join('');
}

function filterAttr1(q) {
  const data = DATA[currentCat].filter(r => r[0].toLowerCase().includes(q.toLowerCase()) || r[1].toLowerCase().includes(q.toLowerCase()));
  renderAttr1(data);
}

function goProducts(attr1) {
  currentAttr1 = attr1;
  const color = CAT_COLORS[currentCat];
  document.getElementById('attr2-title').innerHTML = `<span class="section-dot" style="background:${color}"></span> ${attr1}`;
  document.getElementById('search-products').value = '';
  filteredData = DATA[currentCat].filter(r => r[0] === attr1);
  renderProducts(filteredData);
  setBreadcrumb(['Home', CAT_LABELS[currentCat], attr1]);
  showScreen('attr2');
}

function renderProducts(data) {
  const list = document.getElementById('product-list');
  if (!data.length) { list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>No products found</div></div>'; return; }
  list.innerHTML = data.map((r,i) => `
    <div class="product-card" onclick="goDetail(${DATA[currentCat].indexOf(r)})">
      ${r[1] ? `<div class="product-attr2">${r[1]}</div>` : ''}
      <div class="product-name">${r[2]}</div>
      <div class="price-row">
        <div class="price-pill usd"><span class="price-label">USD</span>${fmt(r[3])}</div>
        <div class="price-pill r65"><span class="price-label">AUD @ 0.65</span>${fmt(r[4])}</div>
        <div class="price-pill r70"><span class="price-label">AUD @ 0.70</span>${fmt(r[5])}</div>
      </div>
    </div>`).join('');
}

function filterProducts(q) {
  const filtered = filteredData.filter(r => r[2].toLowerCase().includes(q.toLowerCase()) || r[1].toLowerCase().includes(q.toLowerCase()));
  renderProducts(filtered);
}

function goDetail(idx) {
  const r = DATA[currentCat][idx];
  setBreadcrumb(['Home', CAT_LABELS[currentCat], r[0], r[2].length > 20 ? r[2].slice(0,20)+'…' : r[2]]);
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-card">
      <div class="detail-product-name">${r[2]}</div>
      <div class="detail-tags">
        <span class="detail-tag">${r[0]}</span>
        ${r[1] ? `<span class="detail-tag">${r[1]}</span>` : ''}
        <span class="detail-tag">${CAT_LABELS[currentCat]}</span>
      </div>
      <div class="price-grid">
        <div class="price-box usd">
          <div class="price-box-label">USD</div>
          <div class="price-box-value">${fmt(r[3])}</div>
        </div>
        <div class="price-box r65">
          <div class="price-box-label">AUD @ 0.65</div>
          <div class="price-box-value">${fmt(r[4])}</div>
        </div>
        <div class="price-box r70">
          <div class="price-box-label">AUD @ 0.70</div>
          <div class="price-box-value">${fmt(r[5])}</div>
        </div>
      </div>
      <div class="supplier-box">
        <div class="supplier-icon">🏷️</div>
        <div>
          <div class="supplier-label">SUPPLIER</div>
          <div class="supplier-name">${r[6]}</div>
        </div>
      </div>
    </div>
    <button class="back-btn" style="width:100%;padding:14px;border-radius:14px;font-size:14px" onclick="showScreen('attr2')">← Back to Products</button>`;
  showScreen('detail');
}

function goSearch() {
  currentCat = 'cases'; // default, will search all
  // Build unified search screen inline
  const allData = [...DATA.cases.map(r=>({...r, cat:'cases'})), ...DATA.accessories.map(r=>({...r, cat:'accessories'})), ...DATA.protectors.map(r=>({...r, cat:'protectors'}))];
  document.getElementById('attr2-title').innerHTML = `<span class="section-dot" style="background:#fff"></span> Search All Products`;
  document.getElementById('search-products').value = '';
  filteredData = Object.values(DATA).flat();
  renderProductsAll(filteredData);
  setBreadcrumb(['Search All']);
  showScreen('attr2');
  // Override filter
  document.getElementById('search-products').oninput = function() {
    const q = this.value.toLowerCase();
    const res = Object.values(DATA).flat().filter(r => r[2].toLowerCase().includes(q) || r[0].toLowerCase().includes(q) || r[1].toLowerCase().includes(q) || r[6].toLowerCase().includes(q));
    renderProductsAll(res);
  };
}

function renderProductsAll(data) {
  const list = document.getElementById('product-list');
  if (!data.length) { list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>No products found</div></div>'; return; }
  list.innerHTML = data.slice(0,50).map(r => `
    <div class="product-card" style="border-left:3px solid ${CAT_COLORS[findCat(r)] || '#7c6af7'}">
      <div style="font-size:10px;color:var(--muted);margin-bottom:4px">${r[0]} ${r[1] ? '· '+r[1] : ''}</div>
      <div class="product-name">${r[2]}</div>
      <div class="price-row">
        <div class="price-pill usd"><span class="price-label">USD</span>${fmt(r[3])}</div>
        <div class="price-pill r65"><span class="price-label">AUD @ 0.65</span>${fmt(r[4])}</div>
        <div class="price-pill r70"><span class="price-label">AUD @ 0.70</span>${fmt(r[5])}</div>
      </div>
      <div style="font-size:10px;color:var(--accent2);margin-top:6px">🏷️ ${r[6]}</div>
    </div>`).join('') + (data.length > 50 ? `<div class="empty" style="padding:16px">Showing first 50 — refine your search</div>` : '');
}

function findCat(row) {
  if (DATA.cases.includes(row)) return 'cases';
  if (DATA.accessories.includes(row)) return 'accessories';
  return 'protectors';
}

// Reset product filter on normal product screen
document.getElementById('search-products').oninput = function() { filterProducts(this.value); };
</script>
